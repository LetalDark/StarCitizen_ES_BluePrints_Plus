PU_RefuelNPC03_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=Espero que sea broma con ese precio. Inténtalo de nuevo.
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Ay, mierda. ¡Me están disparando!
PU_RefuelNPC03_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Maldita sea. ¿Podían haber elegido peor momento?
