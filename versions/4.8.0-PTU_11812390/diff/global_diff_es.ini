Adagio_Industrial_Salvage_Universal_Intro_Desc_001=Adagio Holdings\nUn orgulloso empleador que ofrece igualdad de oportunidades\n\n> Sobre nosotros <\nComo principal proveedor y distribuidor de derechos de recuperación, Adagio Holdings busca ahora expandirse hacia la adquisición y distribución de materiales recuperables para empresas tanto pequeñas como de gran escala.\n\n> Sobre el trabajo <\nComo parte de esta iniciativa, necesitamos contratistas con buen ojo capaces de identificar materiales recuperables, desmontarlos de forma eficiente y entregarnos el Recycle Material Composite (RMC) y los componentes recuperados.\n\nEste contrato introductorio requerirá que te dirijas a <EM4>~mission(Location|Address)</EM4> y desmontes una nave abandonada autorizada para recuperación.\n\nUna vez hayas reunido el RMC, lo entregarás en el elevador de carga situado en <EM4>~mission(Destination|Address)</EM4>.\n\n> Requisitos <\n     - Cualquier clase/tamaño de nave de recuperación\n\nPara obtener consejos sobre recuperación, consulta <EM4>A Salvager's Guide to Material Collection</EM4> en tu diario de mobiGlas.\n\n> Aviso legal <\nLos contratistas son responsables de asegurarse de que están recolectando materiales de vehículos que se consideren recuperación legítima conforme a las leyes vigentes de la UEE. Adagio Holdings no se hace responsable de ningún crimen o falta cometidos por los contratistas y no ofrecerá compensación ni reparación alguna a las personas afectadas por estas acciones.\n\n[<EM4>*</EM4> Traducción provisional StarCitizen_ES_Plus — CIG aún no ha publicado el texto oficial de este contrato.]
