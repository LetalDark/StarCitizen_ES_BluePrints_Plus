PU_RefuelNPC04_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Vaya. Qué profesional. ¿Se supone que tengo que quedarme aquí esperando a que te apetezca volver? Claro. Por qué no.
