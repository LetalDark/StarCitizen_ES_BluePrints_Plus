PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_001,P=Vale, estamos conectados. Cuando confirmes la compra de combustible desde tu mobi, puedo iniciar la transferencia.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_002,P=Vale… enlace establecido. Deberías ver la orden de compra de combustible en tu mobi. En cuanto la confirmes, puedo empezar a llenar tus tanques.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingDockingComplete_GP_003,P=Y listo. Enlazados. Ahora solo necesitamos que firmes la compra de combustible en tu mobiGlas.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_001,P=¿Sabes qué? Tengo otros clientes esperando. Hemos terminado.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_002,P=Vale, creo que sé hacia dónde va esto. Me piro.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingEndingContractEarlier_GP_003,P=No tengo tiempo para esto. Buena suerte.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_001,P=Vale, transfiriendo combustible.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_002,P=Genial, iniciando transferencia de combustible.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingFuelTransferStarting_GP_003,P=Pinta bien. El combustible fluye.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_001,P=¡Eh! La transferencia aún no había terminado.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_002,P=¿Por qué te has desconectado? No estás repostado.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingIncomplete_GP_003,P=He perdido la conexión. ¿Qué ha pasado?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=¿A dónde te crees que vas? ¿Y el resto del combustible?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=¿Qué pasa? Tu nave aún no está llena.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Eh… ¿hola? No hemos terminado el repostaje.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Maldita sea, tenemos problemas.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Cuidado. Tenemos hostiles.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Atento. No parecen estar aquí para ayudar.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=¡Eh! ¡Estoy intentando ayudarte!
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=¿Qué demonios estás haciendo?
PU_RefuellingProvider01_UWC_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=Ah, ni hablar. Me piro.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Bueno, eso fue absolutamente aterrador. Vale, démonos prisa y terminemos la transferencia de combustible.
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=¿Eran todos? Vale, ¿qué tal si terminamos esto y nos largamos cagando leches?
PU_RefuelNPC01_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Gracias. Este sistema se vuelve más peligroso cada día. Terminemos esto antes de que aparezcan más.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_001,P=Eso es. Listo para irme. Gracias otra vez y siento las molestias.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_002,P=Vale. Transferencia de combustible completada. Gracias por el rescate. Espero que no haya sido demasiada molestia para ti.
PU_RefuelNPC01_CIV_M_ATC_RefuelingComplete_GP_003,P=Uf. Repostado del todo. Muchas gracias por la ayuda. Voy a intentar fijarme un poco más en mis indicadores la próxima vez.
