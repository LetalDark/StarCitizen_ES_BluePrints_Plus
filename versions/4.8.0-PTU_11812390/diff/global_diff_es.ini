item_Desc_srvl_combat_heavy_legs_03_01_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango térmico: -70 / 100 °C\nProtección contra radiación: 26800 REM\nVelocidad de limpieza de radiación: 145.8 REM/s\nCapacidad de carga: 8K µSCU\n8 kg | Stun: 60% | Impacto: 35%\n\nFavorita de los cazadores más brutales, la armadura Wrecker es una fusión de metal desechado y telas saqueadas, ensamblados para ofrecer protección mientras acechas a tu presa.
