item_DescBuccaneer_Paint_Red_Red_Black=Con una pintura base roja intensa con detalles en negro, la pintura Redline le da a la Buccaneer un aspecto nuevo y audaz.Con una feroz pintura base roja y acentos negros, la pintura Redline dota al Buccaneer de un aspecto audaz y renovado.
item_DescHermes_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_DescHullB_Paint_Black_White_Yellow=El transporte de carga adquiere un aspecto audaz con la pintura Hull B Empyrean, que presenta un diseño tricolor dinámico. Los detalles amarillos separan una proa blanca de una sección de ingeniería gris, aportando una sensación de velocidad al carguero.El transporte de carga adopta un aspecto audaz y renovado con la pintura Empyrean del Hull B, que presenta un diseño tricolor dinámico. Los destellos amarillos añaden estilo a la base en blanco y negro.
item_DescHullB_Paint_Black_Yellow_Black=Para los capitanes de carga de largo recorrido que prefieren hacer una declaración sutil con su carguero, MISC ofrece la distinguida pintura Hull B Dusk. Un casco completamente gris resalta la silueta clásica de la nave con elegantes detalles en dorado.Para los capitanes de carga de largas distancias que prefieren hacer una declaración discreta con su buque, MISC ofrece la distinguida pintura Dusk con sus tonos negros y amarillos.
item_DescHullB_Paint_Brown_White_Bronze=Incluso una nave trabajadora merece lucir lo mejor posible. La pintura Hull B Horizon ofrece un elegante esquema de color en dos tonos gris y blanco, ideal para atraer miradas en el puerto espacial.Hasta una nave trabajadora merece lucir su mejor aspecto. La pintura Horizon del Hull B ofrece un elegante juego de dos tonos gris y blanco con toques de bronce.
item_DescHullB_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_DescHullB_Paint_Yellow_Yellow_Black=Los transportistas que quieran llamar la atención con el aspecto de su Hull B deberían equipar la pintura First Light, con su parte frontal negra y secciones traseras amarillas.Los transportistas que quieran llamar la atención con la estética de su Hull B deberían equipar la pintura First Light, con su frontal negro y cuerpo amarillo.
item_DescMISC_Hull_B_MRCK_S06_Bespoke=Tipo de artículo: Soporte de misiles\nFabricante: MISC\nTamaño: 6\nMisiles: 8xS3\n\nSoporte de misiles específico para la MISC Hull B que dispara ocho misiles S3.Tipo de objeto: Rack de Misiles\nFabricante: MISC\nTamaño: 6\nMisiles: 8xS3\n\nRack de misiles a medida para el MISC Hull B que dispara ocho misiles S3.
item_DescRAFT_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_DescUTV_Paint_Brown_Grey_Red=Camuflaje marrón claro y gris combinados con detalles en rojo para la pintura Resistor Camo.El camuflaje marrón claro y gris se combina con acentos rojos en la pintura Resistor Camo.
item_DescUTV_Paint_Gold_Black_Black=La pintura Bonanza le da a la UTV un aspecto lustroso con su acabado en dorado y negro.La pintura Bonanza otorga al UTV un aspecto lujoso con su acabado dorado y negro.
item_DescUTV_Paint_Green_Grey_Red=La pintura Wilderness Camo aporta un patrón clásico de camuflaje verde y gris a la UTV con detalles en rojo.La pintura Wilderness Camo aporta al UTV un clásico patrón de camuflaje en verde y gris con acentos rojos.
item_DescUTV_Paint_Grey_Black_Orange=Los vibrantes toques de naranja destacan sobre la pintura base gris de la pintura Reckoner.Llamativos toques de naranja destacan sobre la base gris de la pintura Reckoner.
item_DescUTV_Paint_White_Blue_Blue=Blanco nítido con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, recuperación y más han hecho del imperio lo que es hoy.Blanco impoluto con acentos azules, la pintura Keystone celebra a los trabajadores cuya minería, refinado, transporte, desguace y demás labores han sido los verdaderos cimientos del esfuerzo fronterizo en Stanton.
item_Desc_DMC_gloves_01_01_02=Los guantes Gauntlet de DMC se sienten como una larga jornada de trabajo. Fabricados con resistentes mallas compuestas GranTec, estos Gauntlet hacen honor a su nombre, brindando máxima protección frente a entornos e impactos para que puedas seguir trabajando un día más.
