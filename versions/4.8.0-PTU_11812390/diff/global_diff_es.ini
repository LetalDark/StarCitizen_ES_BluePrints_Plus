PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=¿Has perdido la cabeza?
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=¿A qué demonios viene eso?
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Parece que estamos a salvo de momento. Mejor terminamos el repostaje.
