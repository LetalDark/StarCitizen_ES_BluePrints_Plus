item_Desc_srvl_combat_heavy_arms_03_01_01=Tipo de artículo: Armadura pesada\nReducción de daño: 40%\nRango de temperatura: -70 / 100 °C\nProtección contra radiación: 26800 REM\nTasa de depuración de radiación: 145.8 REM/s\n6 kg | Stun: 60% | Impacto: 35%\n\nPreferida por los cazadores más brutales, la armadura Wrecker es una fusión de metal desechado y telas robadas, ensamblados para ofrecer protección mientras acechas a tu presa.
