PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=Vale. Conectado. No está mal. Solo necesito que apruebes la transacción de combustible.
PU_RefuelNPC03_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Listo. Todo enganchado. Estoy preparado para revisar los términos de la transacción de combustible en cuanto me los envíes.
