PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Ah, perfecto. Estás aquí. Agradezco la ayuda. No me puedo creer que me haya quedado sin combustible. En fin, listo para acoplar cuando lo estés tú.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=Genial, gracias por venir. Estoy listo para acoplar cuando quieras empezar. La verdad es que yo mismo volaba un cisterna, así que sé lo que es. Eso hace aún más vergonzoso que se me secara el tanque. En fin, te dejo a tu trabajo.
PU_RefuelNPC03_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Eh, has llegado. Gracias por venir. ¿Dónde estaría el 'verse sin repostadores como tú, eh? Lo tengo todo preparado para empezar la transferencia en cuanto te acoples.
