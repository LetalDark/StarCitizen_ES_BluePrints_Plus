UWC_Refueling_easy_desc_001=Hola,\n\nSi vas equipado para repostar, este igual te interesa. \n\nAcaba de activarse una baliza en <EM4>~mission(Location|Address)</EM4>, de un cliente cuya <EM4>~mission(Ship)</EM4> está en las últimas, así que asegúrate de tener tus tanques de combustible al máximo.\n\nLa nave del cliente te pagará a razón de <EM4>~mission(FuelRate) aUEC por SCU de hidrógeno</EM4> y  <EM4>~mission(QTFuelRate) aUEC por SCU de cuántico</EM4>, y como contratista del United Wayfarers Club, también optarás a la tarifa de servicio del UWC indicada arriba al completarlo.\n\nParece un trabajo limpio y de ida y vuelta, pero nunca está de más mantener los escáneres activos.\nDime si te interesa y pongamos a esta buena gente en marcha.\n\nEspero noticias tuyas,\n\nDina Deloit\nCentro de Despachos\nUnited Wayfarers Club\n«Te cubrimos las espaldas»
UWC_Refueling_easy_desc_002,P=Hola, \n\nTengo a un miembro del Club en <EM4>~mission(Location|Address)</EM4> que necesita un repostaje completo. \n\nLa nave del cliente te pagará a razón de <EM4>~mission(FuelRate) aUEC por SCU de hidrógeno</EM4> y  <EM4>~mission(QTFuelRate) aUEC por SCU de cuántico</EM4>, y como contratista del United Wayfarers Club, también optarás a la tarifa de servicio del UWC indicada arriba al completarlo.\n\nSi te interesa, debería ser un encargo sencillo. La baliza está bien lejos de cualquier punto caliente reciente, pero nunca está de más mantener un ojo en los escáneres, ¿no?\n\nTienen sitios a los que ir, así que pongámoslos en marcha.\n\nCuídate ahí fuera.\n\nDina Deloit\nCentro de Despachos\nUnited Wayfarers Club\n«Te cubrimos las espaldas»
UWC_Refueling_easy_title_001=<EM4>[BP]</EM4> SOLICITUD DE REPOSTAJE: ~mission(Ship)
UWC_Refueling_high_desc_001,P=Hola,\n\nOtro día, otra baliza. Hay una <EM4>~mission(Ship)</EM4> con el tanque vacío en <EM4>~mission(Location|Address)</EM4>.  La nave del cliente te pagará a razón de <EM4>~mission(FuelRate) aUEC por SCU de hidrógeno</EM4> y  <EM4>~mission(QTFuelRate) aUEC por SCU de cuántico</EM4>, y como contratista del United Wayfarers Club, también optarás a la tarifa de servicio del UWC indicada arriba al completarlo.\n\nNo te voy a mentir: es un sitio feo donde quedarse atascado, y peor aún para que te pillen por sorpresa. Hemos perdido a buena gente ahí fuera; incluso los que tuvieron suerte volvieron a casa con piezas de menos.\n\nSi decides aceptar el trabajo, hazme un favor y mantén los ojos bien abiertos. Si tienes algún colega con tiempo libre, igual le pides que te cubra.\n\nQuizá esté siendo paranoica, pero eso no significa que no vayan a por ti, como decía mamá Deloit. \nEn realidad nunca lo dijo, pero estoy bastante segura de que lo diría si se ganara la vida con esto.\n\nHaz el trabajo y vuelve a casa sano y salvo, ¿vale?\n\nDina Deloit\nCentro de Despachos\nUnited Wayfarers Club\n«Te cubrimos las espaldas»
UWC_Refueling_high_title_001=<EM4>[BP]</EM4> SOLICITUD DE REPOSTAJE CRÍTICA: ~mission(Ship)
UWC_Refueling_intro_desc_001=¡Hola!\n\nDD del United Wayfarers Club al habla.\n\nEl UWC ofrece servicios de reparación, rearme y repostaje por toda la UEE. Da la casualidad de que estamos buscando nuevos afiliados con naves equipadas para repostar. Si tienes los tanques y te gusta que la gente se alegre de verte, el UWC puede ser tu club.\n\nY si crees que sí, tengo una baliza activa que igual te interesa.\n\nSi resulta que sí, un consejo: <EM4>asegúrate de tener los tanques de combustible llenos antes de salir</EM4>.\n\nUn miembro del Club se ha quedado sin combustible en <EM4>~mission(Location|Address)</EM4>. No tengo claros los detalles, como cómo acabó ahí sin Go Juice, pero al UWC no le gusta dejar a la gente colgada.\n\nLa nave del cliente te pagará a razón de <EM4>~mission(FuelRate) aUEC por SCU de hidrógeno</EM4> y  <EM4>~mission(QTFuelRate) aUEC por SCU de cuántico</EM4>. Como contratista del United Wayfarers Club, también optarás a la tarifa de servicio del UWC indicada arriba al completarlo.\n\nEs un encargo directo. Perfecto si quieres hacerte una idea de este tipo de trabajo. Sal ahí, llena los tanques de su <EM4>~mission(Ship)</EM4> y ponles en marcha. Después de unos cuantos encargos así, el proceso se vuelve memoria muscular. Hasta entonces, hay una <EM4>entrada de diario</EM4> en tu mobiGlas llamada ""Protocolos de repostaje"" que cubre lo básico.\n\nNo se han registrado actividades de forajidos en ese sector, pero mantente alerta. Siempre recomiendo que apuntes a un cierre rápido. Cuanto antes termines, antes podré conseguirte otro contrato. El UWC siempre busca nuevos afiliados. \n\nDeseando trabajar contigo.\n\nDina Deloit\nCentro de Despachos\nUnited Wayfarers Club\n«Te cubrimos las espaldas»
UWC_Refueling_intro_title_001=EL UWC CONTRATA REPOSTADORES
UWC_Refueling_moderate_desc_001,P=¡Hola, tú!\n\nTengo una baliza en <EM4>~mission(Location|Address)</EM4>. Dicen que sus tanques están secos y piden un repostaje completo. Si te interesa, me da la sensación de que se alegrarán mucho de verte.\n\nLa nave del cliente te pagará a razón de <EM4>~mission(FuelRate) aUEC por SCU de hidrógeno</EM4> y  <EM4>~mission(QTFuelRate) aUEC por SCU de cuántico</EM4>, y como contratista del United Wayfarers Club, también optarás a la tarifa de servicio del UWC indicada arriba al completarlo.\n\nEstán atrapados en una zona con mala fama, aunque últimamente las cosas están algo más tranquilas. Aun así, yo diría que merece la pena estar atento, por si quedan problemas al acecho. \n\nEn cualquier caso, cuanto antes vuelvan todos a volar, tú incluido, mejor.\n\nBuen viaje,\n\nDina Deloit\nCentro de Despachos\nUnited Wayfarers Club\n«Te cubrimos las espaldas»
UWC_Refueling_moderate_title_001=<EM4>[BP]</EM4> SOLICITUD DE REPOSTAJE URGENTE: ~mission(Ship)
UWC_Refueling_multiple_hard_desc_001,P=Hola,\n\nEn <EM4>~mission(Location|Address)</EM4> nos acaba de entrar un repostaje para toda una pequeña flota de naves. ¡Cuando llueve, diluvia!\n\nLa nave del cliente te pagará a razón de <EM4>~mission(FuelRate) aUEC por SCU de hidrógeno</EM4> y  <EM4>~mission(QTFuelRate) aUEC por SCU de cuántico</EM4>, y como contratista del United Wayfarers Club, también optarás a la tarifa de servicio del UWC indicada arriba al completarlo.\n\nPor desgracia, donde están atrapados no es el sector más agradable, así que estaría atento a cualquier tontería mientras haces el encargo. \n\nLo mejor será intentar ponerlos a todos en marcha lo antes posible.\n\nBuen viaje,\n\nDina Deloit\nCentro de Despachos\nUnited Wayfarers Club\n«Te cubrimos las espaldas»
UWC_Refueling_multiple_hard_title_001=REPOSTAJE DE FLOTA CRÍTICO
UWC_Refueling_multiple_med_desc_001,P=Hola otra vez,\n\nTengo una baliza en <EM4>~mission(Location|Address)</EM4> y esta es gorda. Una flotilla entera de naves se ha quedado sin combustible al mismo tiempo. Coordinación impresionante y falta de planificación a la vez. \n\nLa nave del cliente te pagará a razón de <EM4>~mission(FuelRate) aUEC por SCU de hidrógeno</EM4> y  <EM4>~mission(QTFuelRate) aUEC por SCU de cuántico</EM4>, y como contratista del United Wayfarers Club, también optarás a la tarifa de servicio del UWC indicada arriba al completarlo.\n\nComo la zona en la que están es bastante segura, no debería haber muchos problemas al acecho, pero hoy en día nunca se sabe. No estaría mal ponerlos de nuevo en marcha tan rápido como puedas.\n\nBuen viaje,\n\nDina Deloit\nCentro de Despachos\nUnited Wayfarers Club\n«Te cubrimos las espaldas»
