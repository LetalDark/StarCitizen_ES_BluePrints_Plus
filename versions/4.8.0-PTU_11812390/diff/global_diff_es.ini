Highpoint_KillAnimals_Derelictoutpostscaves_Desc_E_001=Highpoint Wilderness Specialists\n\nLas poblaciones de fauna local cerca de las cuevas de los puestos abandonados en <EM4>~mission(Location|Address)</EM4> han crecido por encima de niveles sostenibles. Sacrifica el número indicado de criaturas y regresa para cobrar.\n\n[<EM4>*</EM4> Traducción provisional StarCitizen_ES_Plus — CIG aún no ha publicado el texto oficial de este contrato.]
Highpoint_KillAnimals_Derelictoutpostscaves_Desc_H_001=Highpoint Wilderness Specialists\n\nLa situación en <EM4>~mission(Location|Address)</EM4> se ha intensificado — los depredadores alfa dominan las cuevas y amenazan a los equipos de prospección. Necesitamos cazadores experimentados para devolver la población a niveles controlables.\n\n[<EM4>*</EM4> Traducción provisional StarCitizen_ES_Plus — CIG aún no ha publicado el texto oficial de este contrato.]
