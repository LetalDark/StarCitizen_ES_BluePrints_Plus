PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=Genial. Estamos acoplados. Adelante, autoriza la transacción de combustible.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Acople completado. Solo necesito que confirmes la transacción de combustible.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Listo. Establece los términos de la transacción de combustible y le echo un vistazo.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Espera. He perdido la conexión.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Eh, todavía necesito más combustible.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Espera, la transferencia de combustible aún no había terminado.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Eh, gracias por venir. Me siento como un idiota por quedarme sin combustible. Si quieres acoplarte rápido, terminamos con esto.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=Eh, por aquí. Lo siento mucho. Habría jurado que calculé bien la distancia… En fin, vamos a acoplarnos para que puedas seguir tu camino.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Hola. Perdona, esto es muy embarazoso. Tenía un montón de cosas que recoger en la última estación de transferencia y supongo que olvidé repostar. Un fallo de novato. En fin, perdona, si nos acoplamos, te dejo seguir con lo tuyo.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Vale, vuelve pronto. Aquí estaré esperando.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=Tranquilo, atiende lo que tengas que atender. Estaré aquí cuando estés listo.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Ah, te vas… sí, claro, no pasa nada. Puedo esperar.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Vale, reconectemos para poder largarnos de aquí.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Bienvenido de vuelta. Acoplemos y terminemos el repostaje.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=Me alegro de que hayas vuelto. Listo para acoplar cuando lo estés tú.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Genial. Veo la transferencia de combustible en marcha.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=Ese precio es un poco más alto de lo que esperaba.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=¡Joder! ¿¡Quién narices es ese!?
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Tenemos compañía… mala compañía…
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=¡Socorro! Me están atacando.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=¡Eh! ¿A qué viene eso?
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=¿¡Por qué has hecho eso!?
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=¿Qué demonios te pasa?
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Gracias a los cielos. Hay que admitirlo, se ha puesto tenso por un momento. Ahora que se acabó, vamos a terminar.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=Por los pelos. Acabemos el repostaje y me largo.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Me alegro de que se acabara. Espero que terminemos sin más problemas.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_001,P=Vale. Parece que hemos terminado. Me piro.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_002,P=Vale. Estoy repostado. Gracias. Y perdona si he sido un poco brusco. Uno de esos días. Vuela seguro.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_003,P=Listo. Tanque lleno. Pensé que nunca saldría de aquí. Vale. Me marcho.
