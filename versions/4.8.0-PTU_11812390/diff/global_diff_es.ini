PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_001,P=Uh oh. Esto no me da buena espina… ¡Cuidado!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_002,P=Qué raro. No veo ninguna nave… ¡cuidado! Es una trampa.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteCrybabyTrap_GP_003,P=¡Eh! ¡Es un montaje! ¡Cuidado!
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_001,P=Muy bien, parece que acabas de llegar, así que voy a pasarte con el cliente.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_002,P=Genial, has llegado. Te paso al cliente ahora.
PU_DELOIT_UWC_F_PMH_RefuelingArriveonSiteHandover_GP_003,P=Vale, ahora que estás en el sitio te conectaré con el cliente…
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_001,P=¡Eh, atento! Tienes problemas de camino. Mantente alerta.
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_002,P=Eh. Prepárate. Tienes algunos hostiles que llegarán en cualquier momento.
PU_DELOIT_UWC_F_PMH_RefuelingHostilesDetected_GP_003,P=Malas noticias. He detectado algunos hostiles dirigiéndose directos hacia ti.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_001,P=Hola, soy DD. Gracias por aceptar este contrato de repostaje. No sé tú, pero a mí la idea de quedarme tirado sin combustible me da un miedo de cojones. Bueno, por suerte te tienen a ti para rescatarlos.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_002,P=Hola, soy DD. A ver qué tienes hoy entre manos… Vale, un trabajo de repostaje. ¿Qué haríamos sin la gente que olvida llenar el depósito, eh? En fin, te dejo con ello.
PU_DELOIT_UWC_F_PMH_RefuelingMissionAccept_GP_003,P=Hola, soy DD otra vez. Parece que te hemos asignado un trabajo de repostaje. Buena suerte y ten cuidado ahí fuera.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_001,P=Madre mía. Pobre alma… Y me temo que hay más malas noticias. Sin nave que repostar, tengo que cancelar el contrato. El próximo tendrá un final más feliz, espero. Mantente a salvo, ¿me oyes?
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_002,P=No me puedo creer que el cliente no lo haya conseguido. Al menos tú sigues con nosotros, ¿no? El lado bueno y todo eso. Por desgracia, voy a tener que cancelar el contrato. Más suerte la próxima vez.
PU_DELOIT_UWC_F_PMH_RefuelingMissionFailClientShipDestroyed_GP_003,P=Aunque me encanta este trabajo, hay días que son más duros que otros. No solo hemos perdido al cliente, sino que también tengo que cancelar el contrato. Bueno, mañana es otro día, ¿no? Hablamos pronto.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_001,P=¡Uf! Me alegra que hayas salido de ese marrón. Y no te preocupes por el contrato. He conseguido que Wayfarer te pague algunos créditos igualmente. Quiero decir, no fue culpa tuya que la solicitud de servicio resultara ser cebo.
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_002,P=Gracias al cielo que estás bien. Normalmente sin cliente no hay paga, pero he podido conseguir algo de compensación por las molestias. Espero que te alegre un poco el día. Mantente a salvo ahí fuera, ¿vale?
PU_DELOIT_UWC_F_PMH_RefuelingTrapCompleteHazardPay_GP_003,P=No me puedo creer que estés bien. Eso fue bastante aterrador, pero he podido conseguirte una paga por riesgo por todas las molestias. Así podemos volver a sacarte ahí fuera lo antes posible, ¿vale? Hablamos pronto.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_001,P=Eh, hola, voy a ser tu repostador hoy. Adelante, solicita acoplar para que podamos empezar.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_002,P=Bajo de combustible, ¿eh? Le pasa a los mejores. Bueno, solicita acoplar y vemos cómo ponerte de nuevo en marcha.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingArrivesatPlayersLocation_GP_003,P=¿Qué tal? Tengo combustible aquí con tu nombre. Solo necesito que solicites acoplar y te sacamos de aquí.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_001,P=Vale, me alegro de que se acabara. Acabemos el repostaje mientras podamos.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_002,P=Creo que estamos bien. Conecta las naves antes de que aparezcan más.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingCombatEnds_GP_003,P=¿Eran todos? Bien. Vamos a repostarte.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_001,P=Vale, deberías estar listo. Espero que tengas un buen día.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_002,P=Tanque lleno. Mantente a salvo ahí fuera.
PU_RefuellingProvider01_UWC_M_ATC_RefuelingComplete_GP_003,P=Todo en orden. Tanque lleno y el espacio te espera. Cuídate.
