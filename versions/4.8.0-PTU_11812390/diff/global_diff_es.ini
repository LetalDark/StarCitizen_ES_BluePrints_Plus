PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=¡Mierda! ¡Quítamelos de encima!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Tiene que ser una broma. ¿Primero el combustible y ahora esto?
