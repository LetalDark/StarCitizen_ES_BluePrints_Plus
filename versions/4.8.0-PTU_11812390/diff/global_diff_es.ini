Journal_General_Refueling_Content=A veces ocurre lo inesperado: un trabajo exige un desvío repentino, una urgencia obliga a saltarse una parada de repostaje, o la inexperiencia simplemente le pasa factura al piloto. Sea cual sea el motivo, si un piloto se encuentra colgado en el vacío interestelar con el indicador de combustible a cero, ahí es donde el United Wayfarers Club puede ayudar.\n\nAunque la mayoría de los pilotos prefieren repostar en un hangar cuando es posible, si se ven incapaces de hacerlo, pueden crear una baliza para solicitar asistencia de un contratista cualificado. El UWC se enorgullece de un historial probado de varios siglos de duración del trabajo de nuestro equipo dedicado de respondedores que devuelven a las naves al vuelo.\n\nEn esta guía cubriremos los cuatro pasos básicos del protocolo de repostaje del UWC: CONTRATO, MODO DE REPOSTAJE Y ACOPLAMIENTO, PRECIO, REPOSTAR.\n\nCONTRATO\nAntes de aceptar un contrato, pregúntate:\n* ¿Tienes el tipo correcto de combustible —cuántico o de hidrógeno— en cantidad suficiente para el trabajo? Puedes rellenar tus depósitos de combustible en la estación, usando la aplicación Mantenimiento de Vehículos.\n* ¿Tu nave tiene la combinación adecuada de depósitos de combustible y boquillas? Esta configuración determinará la capacidad y la velocidad de repostaje de tu nave. La velocidad de repostaje es un factor importante. Los forajidos rastrean balizas y puede que ya estén en camino. Cuanto más rápido el repostaje, menos posibilidades de compañía no deseada.\n* En ocasiones muy raras puede que estés respondiendo a una baliza falsa: cebo para una emboscada. Dependiendo de lo que te diga el instinto sobre un trabajo, quizá te interese contactar con un compañero afiliado para que te haga de respaldo. Y si el trabajo resulta ser legítimo, todo en orden. El UWC prefiere verte volver a casa a salvo, con tu nave y tu pellejo intactos, listo para el siguiente contrato.\n\nMODO DE REPOSTAJE Y ACOPLAMIENTO\nCuando llegues a la ubicación de la baliza, maniobra en proximidad cercana a la nave del cliente e inicia el modo de repostaje. Esto desplegará la pluma de tu nave y entonces podrás enviar una solicitud de acoplamiento. Una vez aceptada tu solicitud, podrás acoplar.\n\nPRECIO\nEn un contrato del United Wayfarers Club, te pagarán a una tarifa de combustible acordada de antemano y tendrás derecho a una comisión de servicio del UWC. Cualquier contrato no UWC deberá negociarse entre tú y tu cliente.\n\nEntonces podrán aceptar o rechazar a través del mobiGlas. Puedes establecer tu precio en cualquier momento —no importa dónde estés, ni si has aceptado un contrato—, pero no puedes cambiar el precio una vez que tu cliente se haya acoplado contigo. \n\nPodría ser tentador aprovechar la situación y poner un precio alto al combustible que llevas —al fin y al cabo, tú no eres el que está colgado en el espacio, funcionando con los últimos vapores—, pero te animamos a tener cuidado con no cobrar de más por tus servicios. El cliente puede que no siempre tenga razón, pero siempre tiene derecho a buscar una mejor oferta. \n\nREPOSTAR\nUna vez que el cliente haya aceptado el precio, puede comenzar la transferencia de combustible. Aunque puedes transferir combustible entre depósitos en cualquier momento, necesitas que al menos un depósito del combustible requerido esté abierto para que se reposte la nave del cliente. \n\nLO SIGUIENTE\nUna vez que los depósitos estén llenos y el cliente esté contento, dirígete a una estación para rellenar tus depósitos de combustible, usando la aplicación Mantenimiento de Vehículos en tu mobiGlas, y estarás listo para el siguiente contrato.\n\nSI NECESITAS REPOSTAR\nSi te encuentras pilotando una nave que necesita repostaje, puedes hacer tu propia solicitud con unos pocos pasos sencillos:\n\nAbre tu mobiGlas, ve al Gestor de Contratos y elige la pestaña Balizas. Selecciona SERVICIO DE REPOSTAJE como tipo de baliza. Cuando estés listo, pulsa «Emitir baliza» y relájate —quizá con una taza de tu bebida caliente favorita— mientras esperas a que llegue un repostador.\n\nAlgo que conviene recordar es que los repostadores del UWC ofrecen una tarifa de combustible preacordada, mientras que los repostadores ajenos al UWC son libres de negociar una tarifa diferente.
