PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=Great. We're docked up. Go ahead and authorize the fuel transaction.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Docking complete. Just need you to confirm the fuel transaction.
PU_RefuelNPC01_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=That should do it. Set the fuel transaction terms, and I'll take a look.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Hold up. I lost connection.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_002,P=Hey, I still need more fuel.
PU_RefuelNPC01_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Wait, the fuel transfer wasn't done yet.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Hey, thanks for showing up. I feel like an idiot for running out of fuel. If you want to dock up quick, we can get this over with.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=Hey, over here. I'm really sorry about this. I could've sworn I calculated the distance right… Anyway, let's get docked up so you can get on your way.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Hi. Sorry, this is really embarassing. I had a bunch of things I needed to pick up from the last transfer station and I guess I forgot to get fuel. Such a rookie mistake. Anyway, sorry, if we can get docked, I can get you out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=All right, come back soon. I'll be here waiting.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=No worries, take care of whatever you have to. I'll be here when you're ready.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Oh, you're leaving… yeah, sure, that's fine. I can wait.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=Okay, let's get reconnected so we can get out of here.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=Welcome back. Let's dock and finish the refuel.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=Glad you made it. I'm ready to dock when you are.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=That's great. Seeing the fuel transfer now.
PU_RefuelNPC01_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=That price's a bit higher than I was expecting.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Holy shit! Who the hell is that?!
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Got company… got bad company…
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=Help! I'm under attack.
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=Hey! What gives?
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Why did you do that?!
PU_RefuelNPC01_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell's the matter with you?
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Thank the powers. Gotta admit it got tense there for a moment. Now that's done, let's finish up.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=That was close. Let's finish refueling so I can get gone.
PU_RefuelNPC02_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=Glad that's over. Hopefully we can finish up without any more issues.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_001,P=Alright. Looks like we're done. I'm out of here.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_002,P=Okay. I'm refueled. Thanks. And sorry if I was a bit short with you. Just one of those days. Safe flying.
PU_RefuelNPC02_CIV_M_ATC_RefuelingComplete_GP_003,P=There. Tank's full. Thought I would never get out of here. Okay. I'm off.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDeathThroe_GP_001,P=[ Death Scream ]
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_001,P=We're connected. Get the pricing set so we can get going.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_002,P=Docked. Go ahead and send the pricing over.
PU_RefuelNPC02_CIV_M_ATC_RefuelingDockingComplete_GP_003,P=Connection confirmed. Set the transaction terms so we can get started.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_001,P=Hey, I wasn't done refueling yet.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_002,P=What's going on? We're not done refueling.
PU_RefuelNPC02_CIV_M_ATC_RefuelingIncomplete_GP_003,P=Something wrong? I still need more fuel.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_001,P=Good, you're here. Go ahead and dock so we can get this show on the road.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_002,P=About time. Was about to lose my mind if I had to float any longer. Get docked so I can get out of here.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerArrives_GP_003,P=Glad someone showed up. Why don't you hurry up and dock. No reason this has to take any longer than it needs to.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_001,P=Okay… Guess I'm supposed to just wait here then?
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_002,P=Hurry up and come back, okay? I don't want to spend all day waiting on you.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerLeavesArea_GP_003,P=Sure... Leave me waiting here. It's not like I have anything better to do.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_001,P=How about you dock so we can finish this. Or are you going to waste more of my time?
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_002,P=There you are. Dock already and we can wrap this up.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPlayerReturnstoArea_GP_003,P=And my savior returns. How about you dock so I can get going.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPriceAccepted_GP_001,P=Filling up my tank now. Should be done soon.
PU_RefuelNPC02_CIV_M_ATC_RefuelingPriceRejected_GP_001,P=That's more than I can pay.
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_001,P=Damn it. What else can go wrong today!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_002,P=Crap! Get them off me!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyOther_GP_003,P=You gotta be kidding me. First the fuel, and now this?
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_001,P=What the hell are you doing?!
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_002,P=Have you lost your mind?
PU_RefuelNPC02_CIV_M_ATC_RefuelingShipAttackedbyPlayer_GP_003,P=What the hell was that for?
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_001,P=Seems we're safe for now. Better finish refueling.
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_002,P=I think that was the last of 'em. Let's finish sorting my fuel while we can.
PU_RefuelNPC03_CIV_M_ATC_RefuelingCombatEnds_GP_003,P=All clear. Hopefully we can finish refueling before any more trouble shows up.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_001,P=And there we go. Topped off and ready to fly. Thanks for all your hard work.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_002,P=Done. Thanks for the refuel. Fly safe out there.
PU_RefuelNPC03_CIV_M_ATC_RefuelingComplete_GP_003,P=Great. All fueled up. Though here's hoping I won't need your services again for a while.
