Shubin_Rockcracker_CollectLenses_Desc_001=Shubin Interstellar\n\nWe need replacement laser lenses for one of our Rockcracker mining rigs at <EM4>~mission(Location|Address)</EM4>. Recover the lenses from the indicated source and deliver them. Standard compensation applies.
Stanton1_Desc,P=A wealth of ore and other resources are mined on Hurston to manufacture the company’s line of munitions and weapons. Heavy industry has resulted in severe pollution across the planet.\n\nPotential Ship Mineables:\nAluminum\nTin\nOuratite\nQuantainium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nPitambu\nGolden Medmon\nDegnous Root\nCompBoard\nProta\nRevenant Pod\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)\n\nPotential Creatures:\nKopion \nMarok\nQuasigrazer\nJuvenile Valakkar
Stanton1a_Desc,P=This moon was named after the 3rd CEO of Hurston Dynamics, Arial Hurston, who was known for creating the controversial Life/Labor-style employee contract.\n\nPotential Ship Mineables:\nAluminum\nTin\nHephaestanite\nCorundum\nOuratite\nQuantainium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)
Stanton1b_Desc,P=This moon was named after scientist Aberdeen Hurston who was credited with designing the company's first antimatter warhead. \n\nPotential Ship Mineables:\nAluminum\nTitanium\nOuratite\nQuantainium\n\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)
Stanton1c_Desc,P=This moon was named after Hurston Dynamics CEO Magda Hurston who made the decision to purchase Stanton I from the UEE. Magda is the mother of current CEO “Colonel” Gavin E. Hurston.\n\nPotential Ship Mineables:\nAluminum\nTitanium\nAslarite\nQuantainium\n\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)
Stanton1d_Desc,P=This moon was named after Ita Hurston, who died during the First Tevarin War, as a reminder of why “the products Hurston Dynamics makes are so important.”\n\nPotential Ship Mineables:\nAlumium\nTin\nAslarite\nQuantainium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)
Stanton2a_Desc,P=Named after the youngest of the three siblings featured in the 25th century children’s morality tale, 'A Gift for Baba,' this moon features over a hundred currently dormant volcanoes that are said to represent Cellin’s simmering anger.\n\nPotential Ship Mineables:\nQuartz\nAgricium\nTarantite\nQuantainium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)
Stanton2b_Desc,P=Named after the middle brother of the three siblings featured in the 25th century children’s morality tale, 'A Gift for Baba,' this is the largest of Crusader’s moons. Daymar’s slightly eccentric orbit is said to represent his ease at getting lost in the story.\n\nPotential Ship Mineables:\nQuartz\nAgricium\nSilicon\nQuantainium\nTitanium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nHadanite\nJanalite (Caves only)\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)\nStone Bug Shell (Caves)\n\nPotential Creatures\nJuvenile Valakkar
Stanton3b_Desc,P=The low density of Wala is particularly susceptible to tidal forces which result in the moon being noticeably prolate.\n\nPotential Ship Mineables:\nIron\nLaranite\nBeryl\nQuantainium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nJanalite\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)
Stanton4_Desc,P=A terraforming error left the planet with an unnaturally dense cloud cover and a colder than average climate making it an ideal location for owner microTech to house its heat-sensitive computing and manufacturing centers.\n\nPotential Ship Mineables:\nIron\nIce\nHephaestanite\nQuantainium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nJanalite\n\nPotential Harvestables:\nPitambu\nGolden Medmon\nSunset Berry\nHeart of the Woods\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)\n\nPotential Creatures:\nKopion \nMarok\nQuasigrazer
Stanton4c_Desc,P=Named after the ancient Greek muse of music to supposedly remind those gazing upon the moon from microTech to be guided by ‘the natural rhythm of the universe in their designs.’\n\nPotential Ship Mineables:\nIce\nCopper\nTaranite\nQuantainium\n\nPotential Hand Mineables:\nAphorite\nDolivine\nJanalite\n\nPotential Harvestables:\nRanta Dung (Caves)\nAmioshi Plague (Caves)\nArmillaria (Caves)
TheCollector_Mod_ATLS_Geo_Grad1_Desc=Entry-level performance module for the ATLS Geo exo-suit. Provides a modest boost to lifting capacity over the baseline configuration.
TheCollector_Mod_ATLS_Geo_Grad1_Name=ATLS Geo Mod Mk I
TheCollector_Mod_ATLS_Geo_Grad2_Desc=Mid-tier performance module for the ATLS Geo exo-suit. Balanced gains across lifting capacity and energy efficiency.
TheCollector_Mod_ATLS_Geo_Grad2_Name=ATLS Geo Mod Mk II
TheCollector_Mod_ATLS_Geo_Grad3_Desc=High-end performance module for the ATLS Geo exo-suit. Maximum boost to lifting capacity for heavy-duty operations.
TheCollector_Mod_ATLS_Geo_Grad3_Name=ATLS Geo Mod Mk III
UI_MF_Panel_Medical_Bed-Empty,P=Bed Available
UWC_Refueling_easy_desc_001=Hey there,\n\nIf you're fitted for refueling, you might like this one. \n\nA beacon has just gone live at <EM4>~mission(Location|Address)</EM4>, from a client whose <EM4>~mission(Ship)</EM4> is running on empty, so make sure your fuel pods are topped off.\n\nThe client vessel will pay you at the rate of <EM4>~mission(FuelRate) aUEC per SCU of Hydrogen</EM4> and  <EM4>~mission(QTFuelRate) aUEC per SCU of Quantum </EM4>, and as a United Wayfarers Club contractor, you will also qualify for the UWC service fee listed above upon completion.\n\nLooks like a zero-drama one and done, but it never hurts to keep your scanners live.\nLet me know if you're interested and let's get these good people on their way.\n\nWaiting to hear from you,\n\nDina Deloit\nDispatch Hub\nUnited Wayfarers Club\n"We’ve got your back"
UWC_Refueling_easy_desc_002,P=Hey, \n\nI've got a Club member at <EM4>~mission(Location|Address)</EM4> that needs a full refuel. \n\nThe client vessel will pay you at the rate of <EM4>~mission(FuelRate) aUEC per SCU of Hydrogen</EM4> and  <EM4>~mission(QTFuelRate) aUEC per SCU of Quantum </EM4>, and as a United Wayfarers Club contractor, you will also qualify for the UWC service fee listed above upon completion.\n\nIf you're interested, it should be a simple gig. The beacon puts it a long way from any recent trouble spots, but it's never a bad idea to keep one eye on your scanners, right?\n\nThey've got places they want to be, so let's get them on their way.\n\nTake it easy, out there.\n\nDina Deloit\nDispatch Hub\nUnited Wayfarers Club\n"We’ve got your back"
UWC_Refueling_easy_title_001=REFUEL REQUEST: ~mission(Ship)
UWC_Refueling_high_desc_001,P=Hi,\n\nAnother day another beacon. There's a <EM4>~mission(Ship)</EM4> with an empty tank at <EM4>~mission(Location|Address)</EM4>.  The client vessel will pay you at the rate of <EM4>~mission(FuelRate) aUEC per SCU of Hydrogen</EM4> and  <EM4>~mission(QTFuelRate) aUEC per SCU of Quantum </EM4>, and as a United Wayfarers Club contractor, you will also qualify for the UWC service fee listed above upon completion.\n\nI can't lie: it's a nasty place to get stuck and a worse place to get caught by surprise. We've lost good people out there - even the ones who got lucky made it home with pieces missing.\n\nIf you decide to take the job, do me a favour and keep everything peeled. If you've got a buddy with time to spare, maybe reach out for a little back-up.\n\nMaybe I'm being paranoid, but that doesn't mean they're not out to get you, as Momma Deloit used to say. \nActually she never said that - but I'm pretty sure she would if she did this for a living.\n\nJust do the job and get home safe, okay?\n\nDina Deloit\nDispatch Hub\nUnited Wayfarers Club\n"We’ve got your back"
UWC_Refueling_high_title_001= CRITICAL REFUEL REQUEST: ~mission(Ship)
UWC_Refueling_intro_desc_001=Hey!\n\nDD from the United Wayfarers Club here.\n\nThe UWC offers repair, rearming and refuelling services across the UEE. It just so happens that we're on the look-out for new affiliates whose ships are fitted for refuelling. If you've got the fuel pods and like it when people are pleased to see you, the UWC might be the club for you.\n\nAnd if you think it might be, I've got a live beacon you might like.\n\nIf you do happen to like it, a word to the wise: <EM4>make sure your fuel pods are full before you head out</EM4>.\n\nA Club member has run out of fuel at <EM4>~mission(Location|Address)</EM4>. I'm not sure on the details, like how they ended up out there with no Go Juice, but the UWC doesn't like to leave folk hanging.\n\nThe client vessel will pay you at the rate of <EM4>~mission(FuelRate) aUEC per SCU of Hydrogen</EM4> and  <EM4>~mission(QTFuelRate) aUEC per SCU of Quantum </EM4>. As a United Wayfarers Club contractor, you will also qualify for the UWC service fee listed above upon completion.\n\nIt's a straightforward run. Perfect if you want to get a feel for this kind of job. Get out there, fill up the tanks of their <EM4>~mission(Ship)</EM4> and get them on their way. Do enough runs like this, and the process becomes muscle memory. Until then, there's a <EM4>journal entry</EM4> on your mobiGlas called ""Refueling Protocols"" that covers the basics.\n\nThere have been no reports of outlaw activity in that sector, but stay alert. I always recommend you aim for a fast turnaround. The sooner you're done, the sooner I can fix you up with another contract. UWC's always looking for new affiliates. \n\nLooking forward to working with you.\n\nDina Deloit\nDispatch Hub\nUnited Wayfarers Club\n"We’ve got your back"
UWC_Refueling_intro_title_001=UWC'S HIRING REFUELERS
UWC_Refueling_moderate_desc_001,P=Hey, you!\n\nI've got a beacon at <EM4>~mission(Location|Address)</EM4>. They say their tanks are dry and they're calling for a full refuel. If you're interested, I get the feeling they'll be really pleased to see you.\n\nThe client vessel will pay you at the rate of <EM4>~mission(FuelRate) aUEC per SCU of Hydrogen</EM4> and  <EM4>~mission(QTFuelRate) aUEC per SCU of Quantum </EM4>, and as a United Wayfarers Club contractor, you will also qualify for the UWC service fee listed above upon completion.\n\nThey're stuck out in an area with a bad reputation, though things have been a bit more quiet recently. Still worth staying alert I'd say, just in case there's still trouble lurking out there. \n\nEither way, the sooner everyone's able to get flying again - and that includes you - the better.\n\nHappy trails,\n\nDina Deloit\nDispatch Hub\nUnited Wayfarers Club\n"We’ve got your back"
UWC_Refueling_moderate_title_001=URGENT REFUEL REQUEST: ~mission(Ship)
UWC_Refueling_multiple_hard_desc_001,P=Heyo,\n\nOver at <EM4>~mission(Location|Address)</EM4> we just got a refueling job for an entire small fleet of ships. Talk about when it rains it pours!\n\nThe client vessel will pay you at the rate of <EM4>~mission(FuelRate) aUEC per SCU of Hydrogen</EM4> and  <EM4>~mission(QTFuelRate) aUEC per SCU of Quantum </EM4>, and as a United Wayfarers Club contractor, you will also qualify for the UWC service fee listed above upon completion.\n\nUnfortunately, where they're held up isn't the nicest of sectors so I'd be alert for any tomfoolery while you're doing the run. \n\nIt'll be best to try get them all back on their way as soon as you can.\n\nHappy trails,\n\nDina Deloit\nDispatch Hub\nUnited Wayfarers Club\n"We’ve got your back"
UWC_Refueling_multiple_hard_title_001=CRITICAL FLEET REFUEL
UWC_Refueling_multiple_med_desc_001,P=Hey again,\n\nI've got a beacon at <EM4>~mission(Location|Address)</EM4> and this one's a big one. An entire little fleet of ships all burned out of fuel at the same time. Impressive coordination and lack of planning at the same time. \n\nThe client vessel will pay you at the rate of <EM4>~mission(FuelRate) aUEC per SCU of Hydrogen</EM4> and  <EM4>~mission(QTFuelRate) aUEC per SCU of Quantum </EM4>, and as a United Wayfarers Club contractor, you will also qualify for the UWC service fee listed above upon completion.\n\nHopefully since the area they're in is pretty safe, there shouldn't be too much trouble lurking, but these days you never know. Wouldn't hurt to get them back flying again as quick as you're able.\n\nHappy trails,\n\nDina Deloit\nDispatch Hub\nUnited Wayfarers Club\n"We’ve got your back"
UWC_Refueling_multiple_med_title_001=URGENT FLEET REFUEL
