Adagio_Industrial_Component_Salvage_Levski_E_Desc_001=Adagio Holdings\nA proud equal opportunity employer\n\n> About the job <\nTo help fulfill a recent small-scale order, we're looking for contractors to help obtain Recycled Material Composite (RMC) and components by dismantling abandoned ships near Levski. We recommend searching at Lagrange points for wrecks, or you can buy a salvage claim through us via your Contract Manager.\n\nOnce obtained, deliver the materials at the cargo elevator located in <EM4>~mission(Destination|Address)</EM4>.\n\nFor salvage tips, see <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Requirements <\n     - Any class/size of salvage ship\n\n> Legal notice <\nContractors are responsible for ensuring they are collecting materials from vehicles deemed legitimate salvage under current UEE law. Adagio Holdings is not responsible for any crime or offense committed by contractors and will offer no compensation or remedy to those affected by such actions.
