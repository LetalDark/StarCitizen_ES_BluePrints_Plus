Adagio_Industrial_Salvage_Universal_Intro_Desc_001=Adagio Holdings\nA proud equal opportunity employer\n\n> About us <\nAs a primary provider and distributor of salvage rights, Adagio Holdings is now expanding into the acquisition and distribution of salvageable materials for both small and large-scale enterprises.\n\n> About the job <\nAs part of this initiative, we need contractors with a sharp eye for identifying salvageable materials, efficiently dismantling them, and delivering us the Recycle Material Composite (RMC) and components recovered.\n\nThis introductory contract will require you to head to <EM4>~mission(Location|Address)</EM4> and dismantle an abandoned ship authorized for salvage.\n\nOnce you have gathered the RMC, you will deliver it at the cargo elevator located in <EM4>~mission(Destination|Address)</EM4>.\n\n> Requirements <\n     - Any class/size of salvage ship\n\nFor salvage tips, see <EM4>A Salvager's Guide to Material Collection</EM4> in your mobiGlas journal.\n\n> Legal notice <\nContractors are responsible for ensuring they are collecting materials from vehicles deemed legitimate salvage under current UEE law. Adagio Holdings is not responsible for any crime or offense committed by contractors and will offer no compensation or remedy to those affected by such actions.
