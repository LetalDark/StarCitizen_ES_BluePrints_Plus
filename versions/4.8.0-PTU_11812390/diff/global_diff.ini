Journal_General_Refueling_Content=Sometimes the unexpected happens - a job demands a sudden detour, a time crunch forces a missed refuel stop, or inexperience just bites a pilot on the behind. Whatever the reason, if a pilot finds themselves hanging in the interstellar void with a fuel gauge on zero, that's where The United Wayfarers Club can help.\n\nWhile most pilots prefer to refuel in a hangar when possible, if they find themselves unable to, they can create a beacon to request assistance from a qualified contractor. The UWC prides itself on a proven track record several centuries long of our dedicated team of responders getting ships back flying.\n\nIn this guide, we'll cover the four basic steps of the UWC refueling protocol: CONTRACT, REFUELING MODE AND DOCKING, PRICE, REFUEL.\n\nCONTRACT\nBefore accepting a contract, ask yourself:\n* Do you have the right type of fuel - Quantum or Hydrogen - in sufficient quantity for the job? You can top up your fuel pods in the station, using the Vehicle Maintenance App.\n* Does your ship have the right combination of fuel pods and nozzles? This loadout will determine the capacity and refueling speed of your ship. Refueling speed is an important factor. Outlaws scan for beacons and might already be en route. The quicker the refuel, the less chance of unwanted company.\n* On very rare occasions it may turn out that you're responding to a false beacon - bait for an ambush. Depending on what your gut tells you about a job, you might want to consider reaching out to a fellow affiliate to provide back-up. And if the job turns out to be legitimate, it's all good.  The UWC would sooner see you safely home, your vessel and your skin intact, ready for that next contract.\n\nREFUELING MODE AND DOCKING\nWhen you arrive at the beacon's location, maneuver into close proximity to the customer vessel and initiate refuelling mode. This will extend your ship's refuelling nozzle and you will then be able to send a docking request. Once your docking request has been accepted, you can dock.\n\nPRICE\nOn a United Wayfarers Club contract, you will be paid at a pre-agreed upon fuel rate and be entitled a UWC service fee. Any non-UWC contracts should be negotiated between you and your client.\n\nThey will then be able to accept or decline through the mobiGlas. You can set your price at any time - no matter where you are, or whether you have accepted a contract - but you cannot change the price once your client has docked with you. \n\nIt might be tempting to take advantage of the situation and set a high price for the fuel you're carrying - after all, you're not the one hanging in space, running on fumes - but we urge you to be mindful about not overpricing your services. The customer might not always be right, but they always have the right to look for a better offer. \n\nREFUEL\nOnce the customer has accepted the price, the fuel transfer can begin. While you can transfer fuel in-between pods at any time, you need at least one pod of the required fuel to be opened for the customer's ship to be refueled. \n\nWHAT'S NEXT\nOnce the tanks are full and the customer's happy, head to a station to refill your fuel pods, using the Vehicle Maintenance app in your mobiGlas, and you're ready for the next contract.\n\nIF YOU NEED TO REFUEL\nIf you happen to find yourself piloting a ship that's in need of refueling, you can make a request of your own with a few simple steps -\n\nOpen your mobiGlas, navigate to the Contract Manager and choose the Beacons tab. Select REFUELING SERVICE as the Beacon Type. When you're ready, press 'Broadcast Beacon' and sit back - maybe with a cup of your favorite warm beverage - and wait for a refueler to arrive.\n\nSomething that's worth remembering is that UWC refuelers offer a pre-agreed fuel rate and that non-UWC refuelers are free to negotiate a different rate.
